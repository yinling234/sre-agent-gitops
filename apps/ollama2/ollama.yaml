apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama2-pvc
  namespace: ai-services  # 将 PVC 也放入 ai-services 命名空间
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama2
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels: { app: ollama2 }
  template:
    metadata:
      labels: { app: ollama2 }
    spec:
      containers:
      - name: ollama2
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        volumeMounts:
        - name: ollama2-storage
          mountPath: /root/.ollama # 将数据持久化到这个目录
      volumes:
      - name: ollama2-storage
        persistentVolumeClaim:
          claimName: ollama2-pvc # 引用同一个命名空间下的 PVC
---
apiVersion: v1
kind: Service
metadata:
  name: ollama2-service
  namespace: ai-services
spec:
  type: NodePort
  selector: { app: ollama2 }
  ports:
  - port: 11434
    targetPort: 11434
