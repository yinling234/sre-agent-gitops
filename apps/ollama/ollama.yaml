apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
---
# 先创建 PVC（注意：PVC 要和 Deployment 同命名空间 ai-services）
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-pvc-5g
  namespace: ai-services  # 必须和Ollama同命名空间，否则无法绑定
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-storage
  volumeMode: Filesystem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels: { app: ollama }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      # 关键：绑定到PV所在的节点（k8s-node1），否则PVC无法挂载
      nodeName: k8s-node1
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        # 挂载PVC到容器内Ollama的模型存储目录（核心配置）
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama  # Ollama默认存储模型的目录
      # 声明要使用的PVC卷
      volumes:
      - name: ollama-storage
        persistentVolumeClaim:
          claimName: local-pvc-5g  # 对应上面创建的PVC名称
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: ai-services
spec:
  type: NodePort
  selector: { app: ollama }
  ports:
  - port: 11434
    targetPort: 11434
    # 可选：指定固定NodePort（范围30000-32767），不指定则随机分配
    # nodePort: 30143
