apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-pv-5g
spec:
  capacity:
    storage: 5Gi  # 逻辑容量5GB
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /home/k8s-pv-01  # 指向/home下的专用目录
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - k8s-node1  # 你的节点名，直接填好可用
  volumeMode: Filesystem
---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-pvc-5g
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-storage
  volumeMode: Filesystem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels: { app: ollama }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      imagePullPolicy: Never     
 # 新增：定义要使用的PVC卷
      volumes:
      - name: ollama-data  # 卷的名称（自定义，后续挂载时要对应）
        persistentVolumeClaim:
          claimName: local-pvc-5g  # 关联上面定义的PVC名称
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        # 新增：将卷挂载到容器内的Ollama数据目录
        volumeMounts:
        - name: ollama-data  # 必须和上面volumes里的name一致
          mountPath: /root/.ollama  # Ollama默认的模型存储目录，不能改
          # 可选：subPath可以将数据存到PVC的子目录，避免根目录混乱
          # subPath: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: ai-services
spec:
  type: NodePort
  selector: { app: ollama }
  ports:
  - port: 11434
    targetPort: 11434
